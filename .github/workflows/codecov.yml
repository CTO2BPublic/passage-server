name: Codecov

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  # GitHub provider
  test-github:
    name: Test GitHub Provider
    runs-on: ubuntu-latest
    env:
      PASSAGE_CREDS_TESTGITHUB_DATA_APPID: ${{ secrets.TEST_GITHUB_APP_ID }}
      PASSAGE_CREDS_TESTGITHUB_DATA_PRIVATEKEYPATH: ../../../creds/github-app.pem
      PRIVATE_KEY_PATH: ${{ github.workspace }}/creds/github-app.pem

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Create creds directory
        run: |
          mkdir -p creds
          mkdir -p configs
          touch configs/.secret.yml

      - name: Write GitHub private key
        run: echo "${{ secrets.TEST_GITHUB_APP_PRIVATE_KEY }}" > $PRIVATE_KEY_PATH

      - name: Run tests
        run: |
          go test -v -coverprofile=coverage.out ./pkg/providers/github 2>&1 | \
            $(go env GOPATH)/bin/go-junit-report -set-exit-code > junit.xml

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }} # needed if repo is private or branch is protected
